<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroTech - Sign In</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #60a5fa;
            --primary-soft: #dbeafe;
            --danger: #ef4444;
            --success: #10b981;
            --gray-900: #111827;
            --gray-800: #1f2937;
            --gray-700: #374151;
            --gray-600: #4b5563;
            --gray-500: #6b7280;
            --gray-400: #9ca3af;
            --gray-300: #d1d5db;
            --gray-200: #e5e7eb;
            --gray-100: #f3f4f6;
            --gray-50: #f9fafb;
            --white: #ffffff;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            --radius: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
        }

        /* Animated background */
        .bg-bubbles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .bg-bubbles li {
            position: absolute;
            list-style: none;
            display: block;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            bottom: -160px;
            animation: square 25s infinite;
            transition-timing-function: linear;
        }

        .bg-bubbles li:nth-child(1) { left: 10%; }
        .bg-bubbles li:nth-child(2) { left: 20%; width: 80px; height: 80px; animation-delay: 2s; animation-duration: 17s; }
        .bg-bubbles li:nth-child(3) { left: 25%; animation-delay: 4s; }
        .bg-bubbles li:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-duration: 22s; background: rgba(255, 255, 255, 0.1); }
        .bg-bubbles li:nth-child(5) { left: 70%; }
        .bg-bubbles li:nth-child(6) { left: 80%; width: 120px; height: 120px; animation-delay: 3s; background: rgba(255, 255, 255, 0.1); }
        .bg-bubbles li:nth-child(7) { left: 32%; width: 160px; height: 160px; animation-delay: 7s; }
        .bg-bubbles li:nth-child(8) { left: 55%; width: 20px; height: 20px; animation-delay: 15s; animation-duration: 40s; }
        .bg-bubbles li:nth-child(9) { left: 25%; width: 10px; height: 10px; animation-delay: 2s; animation-duration: 40s; background: rgba(255, 255, 255, 0.2); }
        .bg-bubbles li:nth-child(10) { left: 90%; width: 160px; height: 160px; animation-delay: 11s; }

        @keyframes square {
            0% { transform: translateY(0); }
            100% { transform: translateY(-1000px) rotate(600deg); }
        }

        .container {
            max-width: 450px;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        .card {
            background: var(--white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out;
        }

        .card-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--white);
            padding: 2.5rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .card-header i {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: rgba(255,255,255,0.9);
            position: relative;
            z-index: 2;
        }

        .card-header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 2;
        }

        .card-header p {
            opacity: 0.9;
            font-size: 1rem;
            position: relative;
            z-index: 2;
        }

        .card-body {
            padding: 2.5rem 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            color: var(--gray-700);
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group i:first-child {
            position: absolute;
            left: 1rem;
            color: var(--gray-500);
            font-size: 1.1rem;
            transition: color 0.2s;
        }

        .input-group input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-lg);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            background: var(--gray-50);
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-soft);
            background: var(--white);
        }

        .input-group .toggle-password {
            position: absolute;
            right: 1rem;
            left: auto;
            cursor: pointer;
            color: var(--gray-500);
            transition: color 0.2s;
        }

        .input-group .toggle-password:hover {
            color: var(--primary);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .remember-me span {
            color: var(--gray-600);
            font-size: 0.95rem;
        }

        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s;
        }

        .forgot-password:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 1rem;
            font-weight: 600;
            font-size: 1rem;
            border-radius: var(--radius-lg);
            transition: all 0.3s;
            cursor: pointer;
            border: none;
            outline: none;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--white);
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-lg);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-outline:hover {
            background: var(--primary);
            color: var(--white);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .divider {
            position: relative;
            text-align: center;
            margin: 2rem 0;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gray-300), transparent);
        }

        .divider span {
            position: relative;
            background: var(--white);
            padding: 0 1rem;
            color: var(--gray-500);
            font-size: 0.95rem;
        }

        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn-social {
            background: var(--white);
            border: 2px solid var(--gray-200);
            color: var(--gray-700);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.875rem;
            border-radius: var(--radius-lg);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        .btn-social:hover {
            border-color: var(--primary);
            background: var(--gray-50);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-google i { color: #DB4437; }
        .btn-facebook i { color: #4267B2; }

        .signup-link {
            text-align: center;
            margin-top: 2rem;
            color: var(--gray-600);
        }

        .signup-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .signup-link a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray-600);
            text-decoration: none;
            font-size: 0.95rem;
            margin-top: 1.5rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .error-message {
            color: var(--danger);
            font-size: 0.875rem;
            margin-top: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-lg);
            color: white;
            font-weight: 500;
            z-index: 9999;
            animation: slideIn 0.3s ease;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            max-width: 400px;
        }

        .notification.success { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .notification.error { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .notification.info { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .admin-login-section {
            margin-top: 1rem;
            text-align: center;
        }

        #adminLoginForm {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: var(--gray-50);
            border-radius: var(--radius-lg);
            border: 1px solid var(--gray-200);
        }

        #adminLoginForm h3 {
            margin-bottom: 1rem;
            font-size: 1.1rem;
            color: var(--gray-700);
        }

        #adminLoginForm input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius);
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        #adminLoginForm input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-soft);
        }
    </style>
</head>
<body>
    <!-- Animated background bubbles -->
    <ul class="bg-bubbles">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
    </ul>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <i class="fa-regular fa-circle-user"></i>
                <h1>Welcome Back!</h1>
                <p>Sign in to your ElectroTech account</p>
            </div>

            <div class="card-body">
                <div id="messageContainer"></div>

                <form id="loginForm" novalidate>
                    <div class="form-group">
                        <label for="email">
                            <i class="fa-regular fa-envelope" style="margin-right: 0.5rem;"></i>
                            Email Address
                        </label>
                        <div class="input-group">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" id="email" placeholder="you@example.com" required>
                        </div>
                        <div class="error-message" id="emailError"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">
                            <i class="fa-regular fa-lock" style="margin-right: 0.5rem;"></i>
                            Password
                        </label>
                        <div class="input-group">
                            <i class="fa-regular fa-lock"></i>
                            <input type="password" id="password" placeholder="••••••••" required>
                            <i class="fa-regular fa-eye toggle-password" onclick="togglePassword()"></i>
                        </div>
                        <div class="error-message" id="passwordError"></div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe" checked>
                            <span>Remember me</span>
                        </label>
                        <a class="forgot-password" onclick="forgotPassword()">
                            <i class="fa-regular fa-circle-question"></i>
                            Forgot password?
                        </a>
                    </div>

                    <button type="submit" class="btn btn-primary" id="loginBtn">
                        <i class="fa-regular fa-right-to-bracket"></i>
                        Sign In
                    </button>
                </form>

                <div class="divider">
                    <span>or continue with</span>
                </div>

                <div class="social-login">
                    <button class="btn-social btn-google" onclick="googleLogin()">
                        <i class="fa-brands fa-google"></i>
                        Google
                    </button>
                    <button class="btn-social btn-facebook" onclick="facebookLogin()">
                        <i class="fa-brands fa-facebook-f"></i>
                        Facebook
                    </button>
                </div>

                <!-- Admin Login Button -->
                <div class="admin-login-section">
                    <button onclick="showAdminLogin()" class="btn-outline" style="width: auto; padding: 0.5rem 1rem; font-size: 0.9rem;">
                        <i class="fa-regular fa-lock"></i> Login as Admin
                    </button>
                </div>

                <!-- Admin Login Form (Hidden by default) -->
                <div id="adminLoginForm" style="display: none;">
                    <h3><i class="fa-regular fa-shield"></i> Admin Login</h3>
                    <form onsubmit="event.preventDefault(); adminLoginHandler()">
                        <input type="email" id="adminEmail" placeholder="Admin Email" required>
                        <input type="password" id="adminPassword" placeholder="Password" required>
                        <button type="submit" class="btn btn-primary">Login as Admin</button>
                    </form>
                </div>

                <div class="signup-link">
                    Don't have an account? 
                    <a href="signup.html">
                        Create account <i class="fa-regular fa-arrow-right"></i>
                    </a>
                </div>

                <div style="display: flex; justify-content: center;">
                    <a href="index.html" class="back-link">
                        <i class="fa-regular fa-arrow-left"></i>
                        Back to home
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>

    <script>
        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.querySelector('.toggle-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Show/hide admin login form
        function showAdminLogin() {
            const adminForm = document.getElementById('adminLoginForm');
            if (adminForm.style.display === 'none') {
                adminForm.style.display = 'block';
            } else {
                adminForm.style.display = 'none';
            }
        }

        // Admin login handler
        async function adminLoginHandler() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            
            if (!email || !password) {
                showNotification('Please enter email and password', 'error');
                return;
            }
            
            try {
                await adminLogin(email, password);
            } catch (error) {
                console.error('Admin login error:', error);
            }
        }

        // Regular login handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const loginBtn = document.getElementById('loginBtn');
            
            // Clear previous errors
            document.getElementById('emailError').innerHTML = '';
            document.getElementById('passwordError').innerHTML = '';
            
            // Validate
            let isValid = true;
            
            if (!email) {
                document.getElementById('emailError').innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> Email is required';
                isValid = false;
            } else if (!isValidEmail(email)) {
                document.getElementById('emailError').innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> Please enter a valid email address';
                isValid = false;
            }
            
            if (!password) {
                document.getElementById('passwordError').innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> Password is required';
                isValid = false;
            }
            
            if (!isValid) return;
            
            // Disable button
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fa-regular fa-spinner fa-spin spinner"></i> Signing in...';
            
            try {
                // Set persistence
                const persistence = rememberMe 
                    ? firebase.auth.Auth.Persistence.LOCAL 
                    : firebase.auth.Auth.Persistence.SESSION;
                
                await auth.setPersistence(persistence);
                
                // Sign in
                await loginUser(email, password);
                
            } catch (error) {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fa-regular fa-right-to-bracket"></i> Sign In';
            }
        });

        // Email validation function
        function isValidEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        // Google Login
        async function googleLogin() {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                
                // Check if user exists in Firestore
                const userDoc = await db.collection('users').doc(result.user.uid).get();
                
                if (!userDoc.exists) {
                    const nameParts = result.user.displayName ? result.user.displayName.split(' ') : ['', ''];
                    await db.collection('users').doc(result.user.uid).set({
                        firstName: nameParts[0] || '',
                        lastName: nameParts.slice(1).join(' ') || '',
                        displayName: result.user.displayName,
                        email: result.user.email,
                        photoURL: result.user.photoURL,
                        role: 'user',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } else {
                    await db.collection('users').doc(result.user.uid).update({
                        lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                
                showNotification('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            } catch (error) {
                console.error('Google login error:', error);
                showNotification(error.message, 'error');
            }
        }

        // Facebook Login
        async function facebookLogin() {
            try {
                const provider = new firebase.auth.FacebookAuthProvider();
                const result = await auth.signInWithPopup(provider);
                
                const userDoc = await db.collection('users').doc(result.user.uid).get();
                
                if (!userDoc.exists) {
                    const nameParts = result.user.displayName ? result.user.displayName.split(' ') : ['', ''];
                    await db.collection('users').doc(result.user.uid).set({
                        firstName: nameParts[0] || '',
                        lastName: nameParts.slice(1).join(' ') || '',
                        displayName: result.user.displayName,
                        email: result.user.email,
                        photoURL: result.user.photoURL,
                        role: 'user',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } else {
                    await db.collection('users').doc(result.user.uid).update({
                        lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                
                showNotification('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            } catch (error) {
                console.error('Facebook login error:', error);
                showNotification(error.message, 'error');
            }
        }

        // Forgot Password
        async function forgotPassword() {
            const email = prompt('Enter your email address to reset your password:');
            if (!email) return;
            
            if (!isValidEmail(email)) {
                showNotification('Please enter a valid email address', 'error');
                return;
            }
            
            try {
                await auth.sendPasswordResetEmail(email);
                showNotification('Password reset email sent! Check your inbox.', 'success');
            } catch (error) {
                console.error('Password reset error:', error);
                let errorMessage = 'Failed to send reset email.';
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'No account found with this email address.';
                }
                showNotification(errorMessage, 'error');
            }
        }

        // Clear errors on input
        document.getElementById('email').addEventListener('input', () => {
            document.getElementById('emailError').innerHTML = '';
        });
        document.getElementById('password').addEventListener('input', () => {
            document.getElementById('passwordError').innerHTML = '';
        });
    </script>
</body>
</html>
