<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroTech - Upload Product</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #60a5fa;
            --primary-soft: #dbeafe;
            --danger: #ef4444;
            --success: #10b981;
            --gray-900: #111827;
            --gray-800: #1f2937;
            --gray-700: #374151;
            --gray-600: #4b5563;
            --gray-500: #6b7280;
            --gray-400: #9ca3af;
            --gray-300: #d1d5db;
            --gray-200: #e5e7eb;
            --gray-100: #f3f4f6;
            --gray-50: #f9fafb;
            --white: #ffffff;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --radius: 0.5rem;
            --radius-lg: 0.75rem;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-900);
            line-height: 1.5;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .upload-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-md);
        }

        .upload-header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--gray-200);
        }

        .upload-header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .upload-header p {
            color: var(--gray-600);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            color: var(--gray-700);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-soft);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .image-upload-area {
            border: 2px dashed var(--gray-300);
            border-radius: var(--radius);
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1rem;
        }

        .image-upload-area:hover {
            border-color: var(--primary);
            background: var(--primary-soft);
        }

        .image-upload-area i {
            font-size: 3rem;
            color: var(--gray-400);
            margin-bottom: 1rem;
        }

        .image-preview {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            margin-top: 1rem;
            border-radius: var(--radius);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            font-weight: 600;
            font-size: 1rem;
            border-radius: var(--radius);
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            width: 100%;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            margin-top: 1rem;
        }

        .btn-outline:hover {
            background: var(--primary-soft);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin-right: 0.5rem;
        }

        .error-message {
            color: var(--danger);
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--gray-200);
            border-radius: 2px;
            margin: 1rem 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="admin.html" style="display: inline-block; margin-bottom: 1rem; color: var(--primary); text-decoration: none;">
            <i class="fa-regular fa-arrow-left"></i> Back to Admin Panel
        </a>
        
        <div class="upload-card">
            <div class="upload-header">
                <h1>Upload Product</h1>
                <p>Add a new product to your store</p>
            </div>

            <div id="successMessage" class="success-message" style="display: none;">
                <i class="fa-regular fa-circle-check"></i>
                <span>Product uploaded successfully! <a href="admin.html" style="color: #065f46; font-weight: 600;">Go to admin panel</a></span>
            </div>

            <form id="productForm">
                <div class="form-group">
                    <label for="productName">Product Name *</label>
                    <input type="text" id="productName" placeholder="e.g., Sony WH-1000XM4" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="price">Price (K) *</label>
                        <input type="number" id="price" placeholder="1299" min="0" step="0.01" required>
                    </div>

                    <div class="form-group">
                        <label for="oldPrice">Old Price (K)</label>
                        <input type="number" id="oldPrice" placeholder="1999" min="0" step="0.01">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Category *</label>
                        <select id="category" required>
                            <option value="">Select category</option>
                            <option value="smartphones">Smartphones</option>
                            <option value="laptops">Laptops</option>
                            <option value="tablets">Tablets</option>
                            <option value="audio">Audio</option>
                            <option value="accessories">Accessories</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="stock">Stock Quantity *</label>
                        <input type="number" id="stock" placeholder="50" min="0" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="4" placeholder="Product description..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="brand">Brand</label>
                        <input type="text" id="brand" placeholder="e.g., Sony, Apple, Samsung">
                    </div>

                    <div class="form-group">
                        <label for="sku">SKU</label>
                        <input type="text" id="sku" placeholder="PROD-001">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="isNew">
                        <label for="isNew">Mark as New</label>
                    </div>

                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="isFeatured">
                        <label for="isFeatured">Feature this product</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Product Image *</label>
                    <div class="image-upload-area" id="imageUploadArea">
                        <i class="fa-regular fa-cloud-upload"></i>
                        <p>Click to upload or drag and drop</p>
                        <p style="font-size: 0.875rem; color: var(--gray-500);">PNG, JPG up to 5MB</p>
                        <input type="file" id="imageFile" accept="image/*" style="display: none;" required>
                    </div>
                    <img id="imagePreview" class="image-preview" style="display: none;">
                    <div id="imageError" class="error-message"></div>
                </div>

                <div id="progressContainer" style="display: none;">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                    <p id="progressText" style="text-align: center; font-size: 0.875rem; color: var(--gray-600);">Uploading... 0%</p>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <i class="fa-regular fa-cloud-upload"></i> Upload Product
                </button>
            </form>

            <button class="btn btn-outline" onclick="window.location.href='admin.html'">
                Cancel
            </button>
        </div>
    </div>

    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script src="admin.js"></script>

    <script>
        let selectedFile = null;

        // Check if user is admin
        document.addEventListener('DOMContentLoaded', async () => {
            const isAdmin = await requireAdmin();
            if (!isAdmin) return;
            
            // Check if editing existing product
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            
            if (productId) {
                loadProductForEdit(productId);
            }
        });

        // Image upload area click
        document.getElementById('imageUploadArea').addEventListener('click', () => {
            document.getElementById('imageFile').click();
        });

        // Drag and drop
        document.getElementById('imageUploadArea').addEventListener('dragover', (e) => {
            e.preventDefault();
            document.getElementById('imageUploadArea').style.borderColor = 'var(--primary)';
        });

        document.getElementById('imageUploadArea').addEventListener('dragleave', (e) => {
            e.preventDefault();
            document.getElementById('imageUploadArea').style.borderColor = 'var(--gray-300)';
        });

        document.getElementById('imageUploadArea').addEventListener('drop', (e) => {
            e.preventDefault();
            document.getElementById('imageUploadArea').style.borderColor = 'var(--gray-300)';
            
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleImageSelect(file);
            }
        });

        // File input change
        document.getElementById('imageFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleImageSelect(file);
            }
        });

        // Handle image selection
        function handleImageSelect(file) {
            // Validate file size (5MB max)
            if (file.size > 5 * 1024 * 1024) {
                document.getElementById('imageError').textContent = 'File size must be less than 5MB';
                return;
            }
            
            selectedFile = file;
            
            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                const preview = document.getElementById('imagePreview');
                preview.src = e.target.result;
                preview.style.display = 'block';
                document.getElementById('imageUploadArea').style.display = 'none';
            };
            reader.readAsDataURL(file);
            
            document.getElementById('imageError').textContent = '';
        }

        // Form submission
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const progressContainer = document.getElementById('progressContainer');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            
            // Validate
            if (!selectedFile) {
                document.getElementById('imageError').textContent = 'Please select an image';
                return;
            }
            
            // Get form data
            const productData = {
                name: document.getElementById('productName').value,
                price: parseFloat(document.getElementById('price').value),
                oldPrice: document.getElementById('oldPrice').value ? parseFloat(document.getElementById('oldPrice').value) : null,
                category: document.getElementById('category').value,
                stock: parseInt(document.getElementById('stock').value),
                description: document.getElementById('description').value,
                brand: document.getElementById('brand').value,
                sku: document.getElementById('sku').value,
                isNew: document.getElementById('isNew').checked,
                isFeatured: document.getElementById('isFeatured').checked,
                rating: 0,
                reviews: 0
            };
            
            // Disable button and show progress
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-regular fa-spinner fa-spin"></i> Uploading...';
            progressContainer.style.display = 'block';
            
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const productId = urlParams.get('id');
                
                if (productId) {
                    // Update existing product
                    await updateProduct(productId, productData, selectedFile);
                } else {
                    // Upload new product
                    await uploadProduct(productData, selectedFile);
                }
                
                // Show success
                document.getElementById('successMessage').style.display = 'flex';
                document.getElementById('productForm').reset();
                document.getElementById('imagePreview').style.display = 'none';
                document.getElementById('imageUploadArea').style.display = 'block';
                selectedFile = null;
                
                // Reset button
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-regular fa-cloud-upload"></i> Upload Product';
                progressContainer.style.display = 'none';
            } catch (error) {
                console.error('Upload error:', error);
                alert('Error uploading product. Please try again.');
                
                // Reset button
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-regular fa-cloud-upload"></i> Upload Product';
                progressContainer.style.display = 'none';
            }
        });

        // Load product for editing
        async function loadProductForEdit(productId) {
            try {
                const doc = await db.collection('products').doc(productId).get();
                if (!doc.exists) return;
                
                const product = doc.data();
                
                // Fill form
                document.getElementById('productName').value = product.name || '';
                document.getElementById('price').value = product.price || '';
                document.getElementById('oldPrice').value = product.oldPrice || '';
                document.getElementById('category').value = product.category || '';
                document.getElementById('stock').value = product.stock || '';
                document.getElementById('description').value = product.description || '';
                document.getElementById('brand').value = product.brand || '';
                document.getElementById('sku').value = product.sku || '';
                document.getElementById('isNew').checked = product.isNew || false;
                document.getElementById('isFeatured').checked = product.isFeatured || false;
                
                // Show existing image
                if (product.imageUrl) {
                    const preview = document.getElementById('imagePreview');
                    preview.src = product.imageUrl;
                    preview.style.display = 'block';
                    document.getElementById('imageUploadArea').style.display = 'none';
                }
                
                // Update button text
                document.getElementById('submitBtn').innerHTML = '<i class="fa-regular fa-pen-to-square"></i> Update Product';
                
                // Store product ID
                document.getElementById('productForm').dataset.productId = productId;
            } catch (error) {
                console.error('Error loading product:', error);
            }
        }

        // Remove image
        function removeImage() {
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('imageUploadArea').style.display = 'block';
            document.getElementById('imageFile').value = '';
            selectedFile = null;
        }
    </script>
</body>
</html>
