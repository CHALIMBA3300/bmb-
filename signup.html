<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Faith - Sign Up</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-analytics-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #60a5fa;
            --primary-soft: #dbeafe;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --gray-900: #111827;
            --gray-800: #1f2937;
            --gray-700: #374151;
            --gray-600: #4b5563;
            --gray-500: #6b7280;
            --gray-400: #9ca3af;
            --gray-300: #d1d5db;
            --gray-200: #e5e7eb;
            --gray-100: #f3f4f6;
            --gray-50: #f9fafb;
            --white: #ffffff;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            --radius: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
        }

        /* Animated background */
        .bg-bubbles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .bg-bubbles li {
            position: absolute;
            list-style: none;
            display: block;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            bottom: -160px;
            animation: square 25s infinite;
            transition-timing-function: linear;
        }

        .bg-bubbles li:nth-child(1) {
            left: 10%;
        }
        .bg-bubbles li:nth-child(2) {
            left: 20%;
            width: 80px;
            height: 80px;
            animation-delay: 2s;
            animation-duration: 17s;
        }
        .bg-bubbles li:nth-child(3) {
            left: 25%;
            animation-delay: 4s;
        }
        .bg-bubbles li:nth-child(4) {
            left: 40%;
            width: 60px;
            height: 60px;
            animation-duration: 22s;
            background: rgba(255, 255, 255, 0.1);
        }
        .bg-bubbles li:nth-child(5) {
            left: 70%;
        }
        .bg-bubbles li:nth-child(6) {
            left: 80%;
            width: 120px;
            height: 120px;
            animation-delay: 3s;
            background: rgba(255, 255, 255, 0.1);
        }
        .bg-bubbles li:nth-child(7) {
            left: 32%;
            width: 160px;
            height: 160px;
            animation-delay: 7s;
        }
        .bg-bubbles li:nth-child(8) {
            left: 55%;
            width: 20px;
            height: 20px;
            animation-delay: 15s;
            animation-duration: 40s;
        }
        .bg-bubbles li:nth-child(9) {
            left: 25%;
            width: 10px;
            height: 10px;
            animation-delay: 2s;
            animation-duration: 40s;
            background: rgba(255, 255, 255, 0.2);
        }
        .bg-bubbles li:nth-child(10) {
            left: 90%;
            width: 160px;
            height: 160px;
            animation-delay: 11s;
        }

        @keyframes square {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(-1000px) rotate(600deg);
            }
        }

        .container {
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        .card {
            background: var(--white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out;
            backdrop-filter: blur(10px);
        }

        .card-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--white);
            padding: 2rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .card-header i {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            color: rgba(255,255,255,0.9);
            position: relative;
            z-index: 2;
        }

        .card-header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 2;
        }

        .card-header p {
            opacity: 0.9;
            font-size: 1rem;
            position: relative;
            z-index: 2;
        }

        .card-body {
            padding: 2rem 2rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            color: var(--gray-700);
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group i:first-child {
            position: absolute;
            left: 1rem;
            color: var(--gray-500);
            font-size: 1rem;
            transition: color 0.2s;
        }

        .input-group input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-lg);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
            background: var(--gray-50);
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-soft);
            background: var(--white);
        }

        .input-group .toggle-password {
            position: absolute;
            right: 1rem;
            left: auto;
            cursor: pointer;
            color: var(--gray-500);
            transition: color 0.2s;
        }

        .input-group .toggle-password:hover {
            color: var(--primary);
        }

        /* Password strength indicator */
        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            background: var(--gray-200);
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s, background-color 0.3s;
        }

        .strength-text {
            font-size: 0.75rem;
            margin-top: 0.25rem;
            color: var(--gray-600);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .terms {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin: 1.5rem 0;
        }

        .terms input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            margin-top: 0.2rem;
            cursor: pointer;
        }

        .terms label {
            font-size: 0.9rem;
            color: var(--gray-600);
            line-height: 1.5;
        }

        .terms a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .terms a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 1rem;
            font-weight: 600;
            font-size: 1rem;
            border-radius: var(--radius-lg);
            transition: all 0.3s;
            cursor: pointer;
            border: none;
            outline: none;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--white);
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .divider {
            position: relative;
            text-align: center;
            margin: 2rem 0;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gray-300), transparent);
        }

        .divider span {
            position: relative;
            background: var(--white);
            padding: 0 1rem;
            color: var(--gray-500);
            font-size: 0.95rem;
        }

        .social-signup {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn-social {
            background: var(--white);
            border: 2px solid var(--gray-200);
            color: var(--gray-700);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.875rem;
            border-radius: var(--radius-lg);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        .btn-social:hover {
            border-color: var(--primary);
            background: var(--gray-50);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-google i {
            color: #DB4437;
        }

        .btn-facebook i {
            color: #4267B2;
        }

        .login-link {
            text-align: center;
            margin-top: 2rem;
            color: var(--gray-600);
        }

        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .login-link a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray-600);
            text-decoration: none;
            font-size: 0.95rem;
            margin-top: 1.5rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .error-message {
            color: var(--danger);
            font-size: 0.875rem;
            margin-top: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-lg);
            color: white;
            font-weight: 500;
            z-index: 9999;
            animation: slideIn 0.3s ease;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            max-width: 400px;
        }

        .notification i {
            font-size: 1.25rem;
        }

        .notification.success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .notification.error {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .notification.info {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Animated background bubbles -->
    <ul class="bg-bubbles">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
    </ul>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <i class="fa-regular fa-circle-user"></i>
                <h1>Create Account</h1>
                <p>Join Bible Faith today</p>
            </div>

            <div class="card-body">
                <div id="messageContainer"></div>

                <form id="signupForm" novalidate>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <div class="input-group">
                                <i class="fa-regular fa-user"></i>
                                <input type="text" id="firstName" placeholder="John" required>
                            </div>
                            <div class="error-message" id="firstNameError"></div>
                        </div>

                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <div class="input-group">
                                <i class="fa-regular fa-user"></i>
                                <input type="text" id="lastName" placeholder="Doe" required>
                            </div>
                            <div class="error-message" id="lastNameError"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-group">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" id="email" placeholder="you@example.com" required>
                        </div>
                        <div class="error-message" id="emailError"></div>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number (Optional)</label>
                        <div class="input-group">
                            <i class="fa-regular fa-phone"></i>
                            <input type="tel" id="phone" placeholder="+260 97 000 0000">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-group">
                            <i class="fa-regular fa-lock"></i>
                            <input type="password" id="password" placeholder="••••••••" required>
                            <i class="fa-regular fa-eye toggle-password" onclick="togglePassword('password')"></i>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                        <div class="strength-text" id="strengthText">
                            <i class="fa-regular fa-circle-info"></i>
                            Enter a password
                        </div>
                        <div class="error-message" id="passwordError"></div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="input-group">
                            <i class="fa-regular fa-lock"></i>
                            <input type="password" id="confirmPassword" placeholder="••••••••" required>
                            <i class="fa-regular fa-eye toggle-password" onclick="togglePassword('confirmPassword')"></i>
                        </div>
                        <div class="error-message" id="confirmPasswordError"></div>
                    </div>

                    <div class="terms">
                        <input type="checkbox" id="terms" checked>
                        <label for="terms">
                            I agree to the <a href="#">Terms of Service</a> and 
                            <a href="#">Privacy Policy</a>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary" id="signupBtn">
                        <i class="fa-regular fa-user-plus"></i>
                        Create Account
                    </button>
                </form>

                <div class="divider">
                    <span>or sign up with</span>
                </div>

                <div class="social-signup">
                    <button class="btn-social btn-google" onclick="googleSignup()">
                        <i class="fa-brands fa-google"></i>
                        Google
                    </button>
                    <button class="btn-social btn-facebook" onclick="facebookSignup()">
                        <i class="fa-brands fa-facebook-f"></i>
                        Facebook
                    </button>
                </div>

                <div class="login-link">
                    Already have an account? 
                    <a href="login.html">
                        Sign in <i class="fa-regular fa-arrow-right"></i>
                    </a>
                </div>

                <div style="display: flex; justify-content: center;">
                    <a href="index.html" class="back-link">
                        <i class="fa-regular fa-arrow-left"></i>
                        Back to home
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // YOUR FIREBASE CONFIGURATION
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyDEwOyzI3NrIYu3pl1excnSScK7kCtBF5s",
            authDomain: "bible-faith-a6568.firebaseapp.com",
            projectId: "bible-faith-a6568",
            storageBucket: "bible-faith-a6568.firebasestorage.app",
            messagingSenderId: "830045110816",
            appId: "1:830045110816:web:7d0554853f1e9bd9763245",
            measurementId: "G-SZDX8KYEG5"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const analytics = firebase.analytics();

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================

        function togglePassword(fieldId) {
            const passwordInput = document.getElementById(fieldId);
            const toggleIcon = passwordInput.parentElement.querySelector('.toggle-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        function showNotification(message, type = 'info') {
            const existingNotification = document.querySelector('.notification');
            if (existingNotification) {
                existingNotification.remove();
            }

            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            
            let icon = '';
            switch(type) {
                case 'success':
                    icon = '<i class="fa-regular fa-circle-check"></i>';
                    break;
                case 'error':
                    icon = '<i class="fa-regular fa-circle-exclamation"></i>';
                    break;
                default:
                    icon = '<i class="fa-regular fa-circle-info"></i>';
            }
            
            notification.innerHTML = icon + message;
            document.body.appendChild(notification);

            setTimeout(() => {
                if (notification.parentNode) {
                    notification.remove();
                }
            }, 5000);
        }

        function isValidEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function showError(inputId, message) {
            const errorElement = document.getElementById(inputId + 'Error');
            if (errorElement) {
                errorElement.innerHTML = `<i class="fa-regular fa-circle-exclamation"></i> ${message}`;
            }
        }

        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(el => {
                el.innerHTML = '';
            });
        }

        // ============================================
        // PASSWORD STRENGTH CHECKER
        // ============================================
        document.getElementById('password').addEventListener('input', function(e) {
            const password = e.target.value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            
            let strength = 0;
            
            if (password.length >= 8) strength += 25;
            if (password.match(/[a-z]+/)) strength += 25;
            if (password.match(/[A-Z]+/)) strength += 25;
            if (password.match(/[0-9]+/)) strength += 25;
            
            strength = Math.min(strength, 100);
            
            strengthBar.style.width = strength + '%';
            
            if (password.length === 0) {
                strengthBar.style.backgroundColor = 'transparent';
                strengthText.innerHTML = '<i class="fa-regular fa-circle-info"></i> Enter a password';
                strengthText.style.color = 'var(--gray-600)';
            } else if (strength < 25) {
                strengthBar.style.backgroundColor = '#ef4444';
                strengthText.innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> Weak password';
                strengthText.style.color = '#ef4444';
            } else if (strength < 50) {
                strengthBar.style.backgroundColor = '#f59e0b';
                strengthText.innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> Fair password';
                strengthText.style.color = '#f59e0b';
            } else if (strength < 75) {
                strengthBar.style.backgroundColor = '#3b82f6';
                strengthText.innerHTML = '<i class="fa-regular fa-circle-check"></i> Good password';
                strengthText.style.color = '#3b82f6';
            } else {
                strengthBar.style.backgroundColor = '#10b981';
                strengthText.innerHTML = '<i class="fa-regular fa-circle-check"></i> Strong password';
                strengthText.style.color = '#10b981';
            }
        });

        // ============================================
        // SIGNUP HANDLER
        // ============================================
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;
            
            const signupBtn = document.getElementById('signupBtn');
            
            clearErrors();
            
            // Validate
            let isValid = true;
            
            if (!firstName) {
                showError('firstName', 'First name is required');
                isValid = false;
            }
            
            if (!lastName) {
                showError('lastName', 'Last name is required');
                isValid = false;
            }
            
            if (!email) {
                showError('email', 'Email is required');
                isValid = false;
            } else if (!isValidEmail(email)) {
                showError('email', 'Please enter a valid email address');
                isValid = false;
            }
            
            if (!password) {
                showError('password', 'Password is required');
                isValid = false;
            } else if (password.length < 8) {
                showError('password', 'Password must be at least 8 characters');
                isValid = false;
            }
            
            if (password !== confirmPassword) {
                showError('confirmPassword', 'Passwords do not match');
                isValid = false;
            }
            
            if (!terms) {
                showNotification('Please agree to the Terms of Service and Privacy Policy', 'error');
                isValid = false;
            }
            
            if (!isValid) return;
            
            // Disable button
            signupBtn.disabled = true;
            signupBtn.innerHTML = '<i class="fa-regular fa-spinner fa-spin spinner"></i> Creating account...';
            
            try {
                // Create user
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Update profile
                await user.updateProfile({
                    displayName: `${firstName} ${lastName}`
                });
                
                // Save to Firestore
                await db.collection('users').doc(user.uid).set({
                    firstName,
                    lastName,
                    displayName: `${firstName} ${lastName}`,
                    email,
                    phone: phone || '',
                    role: 'user',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    emailVerified: user.emailVerified
                });
                
                // Send email verification
                await user.sendEmailVerification({
                    url: window.location.origin + '/login.html',
                    handleCodeInApp: true
                });
                
                showNotification('Account created successfully! Please check your email to verify your account.', 'success');
                
                setTimeout(() => {
                    window.location.href = 'login.html?verified=false';
                }, 3000);
                
            } catch (error) {
                console.error('Signup error:', error);
                
                signupBtn.disabled = false;
                signupBtn.innerHTML = '<i class="fa-regular fa-user-plus"></i> Create Account';
                
                let errorMessage = 'Signup failed. Please try again.';
                
                switch(error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage = 'This email is already registered. Please login instead.';
                        showError('email', 'Email already in use');
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Invalid email address.';
                        break;
                    case 'auth/weak-password':
                        errorMessage = 'Password is too weak. Please choose a stronger password.';
                        break;
                    case 'auth/network-request-failed':
                        errorMessage = 'Network error. Please check your internet connection.';
                        break;
                }
                
                showNotification(errorMessage, 'error');
            }
        });

        // Google Signup
        async function googleSignup() {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                
                const userDoc = await db.collection('users').doc(result.user.uid).get();
                
                if (!userDoc.exists) {
                    const nameParts = result.user.displayName ? result.user.displayName.split(' ') : ['', ''];
                    const firstName = nameParts[0] || '';

                    await db.collection('users').doc(result.user.uid).set({
